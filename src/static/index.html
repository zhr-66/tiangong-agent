<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天宫医疗 · 智能问诊</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #f5f7fa;
    color: #1a1a1a;
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* ── 侧边栏：会话列表 ─────────────────────────── */
  #sidebar {
    width: 260px;
    background: #ffffff;
    border-right: 1px solid #e5e7eb;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  #sidebar-header {
    padding: 16px;
    border-bottom: 1px solid #e5e7eb;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  #sidebar-header h1 {
    font-size: 16px;
    color: #0ea5e9;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  #new-chat-btn {
    background: #0ea5e9;
    color: white;
    border: none;
    width: 32px;
    height: 32px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
  #new-chat-btn:hover { background: #0284c7; }
  #session-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  .session-item {
    padding: 10px 12px;
    border-radius: 6px;
    cursor: pointer;
    margin-bottom: 4px;
    font-size: 13px;
    color: #4b5563;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: background 0.15s;
  }
  .session-item:hover { background: #f3f4f6; }
  .session-item.active { background: #e0f2fe; color: #0369a1; }
  .session-item .delete-btn {
    opacity: 0;
    background: none;
    border: none;
    color: #ef4444;
    cursor: pointer;
    font-size: 14px;
    padding: 0 4px;
  }
  .session-item:hover .delete-btn { opacity: 0.6; }
  .session-item .delete-btn:hover { opacity: 1; }

  /* ── 用户信息栏 ─────────────────────────── */
  #user-bar {
    padding: 12px 16px;
    border-top: 1px solid #e5e7eb;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
  }
  #user-bar label { color: #6b7280; }
  #user-id-input {
    flex: 1;
    border: 1px solid #d1d5db;
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 13px;
  }

  /* ── 主区域 ─────────────────────────── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  #header {
    background: #ffffff;
    border-bottom: 1px solid #e5e7eb;
    padding: 12px 24px;
    font-size: 14px;
    color: #6b7280;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #status-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #10b981;
    margin-right: 6px;
  }

  /* ── 消息列表 ─────────────────────────── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    scroll-behavior: smooth;
  }
  .msg {
    max-width: 760px;
    margin: 0 auto 20px;
    display: flex;
    gap: 12px;
  }
  .msg-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: white;
  }
  .msg.user .msg-avatar { background: #6366f1; }
  .msg.ai .msg-avatar { background: #0ea5e9; }
  .msg-content {
    flex: 1;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.7;
    word-wrap: break-word;
  }
  .msg.user .msg-content { background: #eef2ff; }
  .msg.ai .msg-content {
    background: #ffffff;
    border: 1px solid #e5e7eb;
  }
  .msg-content p { margin-bottom: 8px; }
  .msg-content p:last-child { margin-bottom: 0; }
  .msg-content code {
    background: #f3f4f6;
    padding: 1px 5px;
    border-radius: 3px;
    font-family: Consolas, Monaco, monospace;
    font-size: 13px;
  }
  .msg-content pre {
    background: #1e293b;
    color: #e2e8f0;
    padding: 12px;
    border-radius: 6px;
    overflow-x: auto;
    margin: 8px 0;
  }
  .msg-content pre code { background: none; padding: 0; color: inherit; }
  .msg-content ul, .msg-content ol { margin: 8px 0 8px 20px; }
  .msg-content strong { font-weight: 600; }
  /* 流式光标 */
  .cursor::after {
    content: '▋';
    color: #0ea5e9;
    animation: blink 1s infinite;
    margin-left: 2px;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* ── 输入区 ─────────────────────────── */
  #input-area {
    background: #ffffff;
    border-top: 1px solid #e5e7eb;
    padding: 16px 24px;
  }
  #input-wrap {
    max-width: 760px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  #message-input {
    flex: 1;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    min-height: 42px;
    max-height: 140px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }
  #message-input:focus { outline: none; border-color: #0ea5e9; }
  #send-btn {
    background: #0ea5e9;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 0 18px;
    height: 42px;
    cursor: pointer;
    font-size: 14px;
    transition: background 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  #send-btn:hover:not(:disabled) { background: #0284c7; }
  #send-btn:disabled { background: #cbd5e1; cursor: not-allowed; }

  /* ── 空状态 ─────────────────────────── */
  #empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #9ca3af;
    text-align: center;
    padding: 40px;
  }
  #empty-state h2 {
    font-size: 20px;
    color: #6b7280;
    margin-bottom: 8px;
    font-weight: 500;
  }
  #empty-state p { font-size: 14px; margin-bottom: 20px; }
  .example-chip {
    background: #ffffff;
    border: 1px solid #e5e7eb;
    border-radius: 16px;
    padding: 6px 14px;
    font-size: 13px;
    color: #4b5563;
    cursor: pointer;
    margin: 4px;
    transition: all 0.2s;
  }
  .example-chip:hover {
    border-color: #0ea5e9;
    color: #0ea5e9;
  }
</style>
</head>
<body>

<!-- 侧边栏 -->
<div id="sidebar">
  <div id="sidebar-header">
    <h1>🏥 天宫医疗</h1>
    <button id="new-chat-btn" title="新建会话">+</button>
  </div>
  <div id="session-list"></div>
  <div id="user-bar">
    <label>用户ID：</label>
    <input id="user-id-input" value="user_001" />
  </div>
</div>

<!-- 主区域 -->
<div id="main">
  <div id="header">
    <span><span id="status-dot"></span>智能问诊助手</span>
    <span id="session-info" style="color:#9ca3af;font-size:12px;"></span>
  </div>
  <div id="messages">
    <div id="empty-state">
      <h2>欢迎使用天宫医疗智能问诊</h2>
      <p>描述您的症状，AI 将协助您完成分诊和挂号</p>
      <div>
        <span class="example-chip">我最近头很疼，还有点发烧</span>
        <span class="example-chip">肚子疼好几天了</span>
        <span class="example-chip">有点不舒服</span>
      </div>
    </div>
  </div>
  <div id="input-area">
    <div id="input-wrap">
      <textarea id="message-input" placeholder="描述您的症状..." rows="1"></textarea>
      <button id="send-btn">发送</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
// 状态管理
// ═══════════════════════════════════════════════════════════════════
const STORAGE_KEY = 'tiangong_sessions';
let sessions = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let currentSessionId = null;
let isStreaming = false;

// ═══════════════════════════════════════════════════════════════════
// DOM 引用
// ═══════════════════════════════════════════════════════════════════
const $messages = document.getElementById('messages');
const $input = document.getElementById('message-input');
const $sendBtn = document.getElementById('send-btn');
const $sessionList = document.getElementById('session-list');
const $newChatBtn = document.getElementById('new-chat-btn');
const $userIdInput = document.getElementById('user-id-input');
const $sessionInfo = document.getElementById('session-info');

// ═══════════════════════════════════════════════════════════════════
// 会话管理
// ═══════════════════════════════════════════════════════════════════
function saveSessions() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions));
}

function createNewSession() {
  const sid = 'session_' + Date.now();
  const session = {
    id: sid,
    title: '新会话',
    messages: [],
    createdAt: Date.now(),
  };
  sessions.unshift(session);
  saveSessions();
  switchSession(sid);
  renderSessionList();
}

function switchSession(sid) {
  currentSessionId = sid;
  renderSessionList();
  renderMessages();
  $sessionInfo.textContent = sid;
}

function deleteSession(sid, e) {
  e.stopPropagation();
  sessions = sessions.filter(s => s.id !== sid);
  saveSessions();
  if (currentSessionId === sid) {
    currentSessionId = sessions.length ? sessions[0].id : null;
  }
  renderSessionList();
  renderMessages();
}

function getCurrentSession() {
  return sessions.find(s => s.id === currentSessionId);
}

// ═══════════════════════════════════════════════════════════════════
// 渲染
// ═══════════════════════════════════════════════════════════════════
function renderSessionList() {
  $sessionList.innerHTML = '';
  if (sessions.length === 0) {
    $sessionList.innerHTML = '<div style="padding:20px;text-align:center;color:#9ca3af;font-size:13px;">暂无会话</div>';
    return;
  }
  sessions.forEach(s => {
    const div = document.createElement('div');
    div.className = 'session-item' + (s.id === currentSessionId ? ' active' : '');
    div.innerHTML = `
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(s.title)}</span>
      <button class="delete-btn" title="删除">✕</button>
    `;
    div.onclick = () => switchSession(s.id);
    div.querySelector('.delete-btn').onclick = (e) => deleteSession(s.id, e);
    $sessionList.appendChild(div);
  });
}

function renderMessages() {
  const session = getCurrentSession();
  if (!session || session.messages.length === 0) {
    $messages.innerHTML = `
      <div id="empty-state">
        <h2>欢迎使用天宫医疗智能问诊</h2>
        <p>描述您的症状，AI 将协助您完成分诊和挂号</p>
        <div>
          <span class="example-chip">我最近头很疼，还有点发烧</span>
          <span class="example-chip">肚子疼好几天了</span>
          <span class="example-chip">有点不舒服</span>
        </div>
      </div>
    `;
    // 重新绑定示例点击
    document.querySelectorAll('.example-chip').forEach(c => {
      c.onclick = () => { $input.value = c.textContent; $input.focus(); };
    });
    return;
  }
  $messages.innerHTML = '';
  session.messages.forEach(m => appendMessageEl(m.role, m.content, false));
  scrollToBottom();
}

function appendMessageEl(role, content, withCursor) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const avatar = role === 'user' ? '🧑' : '🤖';
  div.innerHTML = `
    <div class="msg-avatar">${avatar}</div>
    <div class="msg-content ${withCursor ? 'cursor' : ''}">${markedToHtml(content)}</div>
  `;
  $messages.appendChild(div);
  scrollToBottom();
  return div.querySelector('.msg-content');
}

function scrollToBottom() {
  $messages.scrollTop = $messages.scrollHeight;
}

// ═══════════════════════════════════════════════════════════════════
// 极简 Markdown 渲染（避免引入外部库）
// ═══════════════════════════════════════════════════════════════════
function markedToHtml(text) {
  if (!text) return '';
  let html = escapeHtml(text);
  // 代码块
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
    `<pre><code>${code}</code></pre>`);
  // 行内代码
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // 加粗
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  // 列表
  html = html.replace(/^\s*[-*]\s+(.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>');
  // 段落（连续空行分段）
  html = html.split(/\n\n+/).map(p =>
    p.startsWith('<') ? p : `<p>${p.replace(/\n/g, '<br>')}</p>`
  ).join('');
  return html;
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;')
          .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ═══════════════════════════════════════════════════════════════════
// 发送消息 + SSE 流式接收
// ═══════════════════════════════════════════════════════════════════
async function sendMessage() {
  const content = $input.value.trim();
  if (!content || isStreaming) return;

  const userId = $userIdInput.value.trim() || 'user_001';
  if (!currentSessionId) createNewSession();
  const session = getCurrentSession();

  // 更新会话标题（首条消息截断）
  if (session.messages.length === 0) {
    session.title = content.slice(0, 20) + (content.length > 20 ? '...' : '');
    renderSessionList();
  }

  // 渲染用户消息
  session.messages.push({ role: 'user', content });
  appendMessageEl('user', content, false);

  // 清空输入框
  $input.value = '';
  autoResize();
  setStreaming(true);

  // 渲染 AI 消息占位（带光标）
  const contentEl = appendMessageEl('ai', '', true);
  let aiReply = '';

  try {
    const res = await fetch('/api/v1/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        user_id: userId,
        session_id: currentSessionId,
        message: content,
      }),
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n\n');
      buffer = lines.pop(); // 保留最后不完整的片段

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const dataStr = line.slice(6);
        try {
          const data = JSON.parse(dataStr);
          if (data.type === 'token') {
            aiReply += data.content;
            contentEl.innerHTML = markedToHtml(aiReply);
            contentEl.classList.add('cursor');
            scrollToBottom();
          } else if (data.type === 'done') {
            // 流结束
          } else if (data.type === 'error') {
            aiReply = '❌ 错误：' + data.message;
            contentEl.innerHTML = markedToHtml(aiReply);
          }
        } catch (e) {
          console.warn('解析 SSE 失败:', dataStr);
        }
      }
    }

    // 移除光标
    contentEl.classList.remove('cursor');
    if (!aiReply) {
      contentEl.innerHTML = '<span style="color:#9ca3af;">（无回复）</span>';
      aiReply = '（无回复）';
    }

    // 保存 AI 消息
    session.messages.push({ role: 'ai', content: aiReply });
    saveSessions();

  } catch (err) {
    contentEl.classList.remove('cursor');
    contentEl.innerHTML = `<span style="color:#ef4444;">❌ 请求失败：${escapeHtml(err.message)}</span>`;
    session.messages.push({ role: 'ai', content: `❌ 请求失败：${err.message}` });
    saveSessions();
  } finally {
    setStreaming(false);
  }
}

function setStreaming(v) {
  isStreaming = v;
  $sendBtn.disabled = v;
  $sendBtn.textContent = v ? '接收中...' : '发送';
}

// ═══════════════════════════════════════════════════════════════════
// 输入框自适应高度
// ═══════════════════════════════════════════════════════════════════
function autoResize() {
  $input.style.height = 'auto';
  $input.style.height = Math.min($input.scrollHeight, 140) + 'px';
}

// ═══════════════════════════════════════════════════════════════════
// 事件绑定
// ═══════════════════════════════════════════════════════════════════
$sendBtn.onclick = sendMessage;
$input.addEventListener('input', autoResize);
$input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
$newChatBtn.onclick = createNewSession;

// 示例 chip 点击
document.addEventListener('click', (e) => {
  if (e.target.classList.contains('example-chip')) {
    $input.value = e.target.textContent;
    $input.focus();
    autoResize();
  }
});

// ═══════════════════════════════════════════════════════════════════
// 初始化
// ═══════════════════════════════════════════════════════════════════
if (sessions.length === 0) {
  createNewSession();
} else {
  switchSession(sessions[0].id);
}
renderSessionList();
</script>
</body>
</html>
